<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Foresight — Crime Intelligence Map</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- Leaflet Draw -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <!-- React + ReactDOM + Babel (for JSX in-browser) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Chart.js for right panel visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
      :root {
        --red: #ff3a2e;
        --red2: #ff6b3d;
        --amber: #ffb800;
        --dark: #070b14;
        --dark2: #0d1322;
        --dark3: #111827;
        --panel: #0f1627;
        --panel2: #141f35;
        --border: rgba(42, 53, 85, 0.8);
        --border2: rgba(42, 53, 85, 0.4);
        --text: #e8eeff;
        --muted: #6b7a9a;
        --dim: #2a3555;
        --green: #00ff88;
        --blue: #00b4ff;
        --font-display: "Barlow Condensed", sans-serif;
        --font-mono: "Space Mono", monospace;
        --font-body: "DM Sans", sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--dark);
      }
      body {
        font-family: var(--font-body);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      /* Top bar */
      #topbar {
        height: 56px;
        flex-shrink: 0;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 1.1rem;
        gap: 1rem;
        position: relative;
        z-index: 10;
      }
      .tb-left {
        display: flex;
        align-items: center;
        gap: 0.85rem;
      }
      .logo-icon {
        width: 34px;
        height: 34px;
        border-radius: 6px;
        background: var(--red);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px rgba(255, 58, 46, 0.55);
        font-size: 1.2rem;
      }
      .logo-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-family: var(--font-display);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .logo-title {
        font-weight: 900;
        font-size: 1.2rem;
      }
      .logo-sub {
        font-size: 0.66rem;
        color: var(--muted);
      }
      .team-pill {
        border-radius: 999px;
        border: 1px solid rgba(0, 255, 136, 0.5);
        color: var(--green);
        padding: 0.18rem 0.75rem;
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .tb-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.85rem;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--muted);
      }
      .pill {
        padding: 0.25rem 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--border2);
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--panel2);
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
      }

      /* Layout */
      #layout {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
      }
      #sidebar {
        width: 320px;
        flex-shrink: 0;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      #right-panel {
        width: 360px;
        flex-shrink: 0;
        background: var(--panel);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      #map-wrap {
        flex: 1;
        position: relative;
        min-width: 0;
      }
      #map {
        width: 100%;
        height: 100%;
      }

      .panel-header {
        padding: 0.8rem 1rem;
        border-bottom: 1px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        flex-shrink: 0;
      }
      .panel-header span.title {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 0.9rem;
        color: var(--text);
      }

      .panel-body {
        padding: 0.85rem 1rem 1.1rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        font-size: 0.82rem;
        overflow-y: auto;
        min-height: 0;
      }
      .panel-body::-webkit-scrollbar,
      .scroll-list::-webkit-scrollbar {
        width: 3px;
      }
      .panel-body::-webkit-scrollbar-thumb,
      .scroll-list::-webkit-scrollbar-thumb {
        background: var(--dim);
      }

      .field-label {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.2rem;
      }
      .input-row {
        display: flex;
        flex-direction: column;
      }
      .text-input,
      .select-input {
        background: var(--dark2);
        border: 1px solid var(--border2);
        color: var(--text);
        border-radius: 4px;
        padding: 0.4rem 0.55rem;
        font-family: var(--font-body);
        font-size: 0.8rem;
        outline: none;
      }
      .text-input:focus,
      .select-input:focus {
        border-color: var(--blue);
      }

      .chips-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-top: 0.25rem;
      }
      .chip {
        padding: 0.22rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--border2);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--muted);
        white-space: nowrap;
      }

      .scroll-list {
        max-height: 220px;
        overflow-y: auto;
        border-radius: 4px;
        border: 1px solid var(--border2);
        background: var(--dark2);
        padding: 0.35rem 0.3rem;
      }
      .crime-row {
        padding: 0.4rem 0.45rem;
        border-radius: 3px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        transition: background 0.15s;
      }
      .crime-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .crime-row-title {
        font-size: 0.8rem;
        font-weight: 500;
      }
      .crime-row-meta {
        font-size: 0.7rem;
        color: var(--muted);
      }

      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        max-height: 140px;
        overflow-y: auto;
        padding: 0.4rem;
        border-radius: 4px;
        border: 1px solid var(--border2);
        background: var(--dark2);
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.8rem;
        color: var(--text);
      }
      .checkbox-item input {
        accent-color: var(--red);
      }

      .hint {
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.5;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 0.2rem;
      }
      .stat-row strong {
        color: var(--text);
      }

      /* Map HUD */
      .map-hud {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 500;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .map-btn {
        background: var(--panel);
        border: 1px solid var(--border2);
        color: var(--text);
        padding: 0.35rem 0.7rem;
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        text-transform: uppercase;
      }
      .map-btn:hover {
        border-color: var(--blue);
        color: var(--blue);
      }
      .map-btn.active {
        background: rgba(255, 58, 46, 0.12);
        border-color: var(--red);
        color: var(--red);
      }
      .coords-pill {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: var(--panel);
        border: 1px solid var(--border2);
        border-radius: 4px;
        padding: 0.35rem 0.7rem;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--muted);
        z-index: 500;
      }

      /* Right panel charts */
      .rp-header {
        padding: 0.8rem 1rem;
        border-bottom: 1px solid var(--border2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .rp-title {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 0.9rem;
        color: var(--text);
      }
      .rp-body {
        padding: 0.9rem 1rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        overflow-y: auto;
        min-height: 0;
      }
      .rp-toggle-btn {
        background: transparent;
        border-radius: 999px;
        border: 1px solid var(--border2);
        padding: 0.32rem 0.9rem;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .rp-toggle-btn.active {
        border-color: var(--red);
        color: var(--red);
        background: rgba(255, 58, 46, 0.12);
      }
      .chart-card {
        background: var(--dark2);
        border-radius: 6px;
        border: 1px solid var(--border2);
        padding: 0.6rem 0.65rem 0.8rem;
      }
      .chart-title {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      /* Leaflet overrides */
      .leaflet-container {
        background: #0d1322 !important;
      }
      .leaflet-tile {
        filter: brightness(0.45) saturate(0.9) hue-rotate(190deg);
      }
      .leaflet-popup-content-wrapper {
        background: var(--panel2);
        border-radius: 8px;
        border: 1px solid var(--border);
        color: var(--text);
        box-shadow: 0 4px 22px rgba(0, 0, 0, 0.7);
      }
      .leaflet-popup-tip {
        background: var(--panel2);
      }
      .leaflet-popup-content {
        font-family: var(--font-body);
        font-size: 0.8rem;
      }

      @media (max-width: 960px) {
        #right-panel {
          display: none;
        }
      }
      @media (max-width: 780px) {
        #sidebar {
          width: 100%;
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          height: 55%;
          z-index: 600;
          border-right: none;
          border-top: 1px solid var(--border);
        }
        #layout {
          flex-direction: column-reverse;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useMemo } = React;

      // ---- Utility helpers -------------------------------------------------
      function parseDate(value) {
        if (!value) return null;
        const d = new Date(value);
        return isNaN(d.getTime()) ? null : d;
      }

      function crimeColor(crime) {
        const head = (crime.CrimeHead_Name || "").toLowerCase();
        const group = (crime.CrimeGroup_Name || "").toLowerCase();
        if (head.includes("murder") || group.includes("murder")) return "#ff3a2e";
        if (head.includes("rape") || head.includes("sexual") || group.includes("sexual"))
          return "#ff6b3d";
        if (group.includes("property") || head.includes("theft") || head.includes("robbery"))
          return "#ffb800";
        if (group.includes("cyber")) return "#00b4ff";
        return "#38bdf8";
      }

      function crimeIcon(crime) {
        const group = (crime.CrimeGroup_Name || "").toLowerCase();
        const head = (crime.CrimeHead_Name || "").toLowerCase();
        if (group.includes("murder") || head.includes("murder")) return "✖";
        if (head.includes("rape") || head.includes("sexual")) return "⚠";
        if (head.includes("theft") || head.includes("robbery")) return "₹";
        if (group.includes("cyber")) return "⌘";
        return "●";
      }

      function pointInPolygon(point, vs) {
        const x = point[0],
          y = point[1];
        let inside = false;
        for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
          const xi = vs[i][0],
            yi = vs[i][1];
          const xj = vs[j][0],
            yj = vs[j][1];

          const intersect =
            yi > y !== yj > y &&
            x < ((xj - xi) * (y - yi)) / (yj - yi + 0.0000001) + xi;
          if (intersect) inside = !inside;
        }
        return inside;
      }

      // ---- Map component ---------------------------------------------------
      function CrimeMap({ crimes, onCrimeClick, onRegionSelect }) {
        const mapRef = useRef(null);
        const layerRef = useRef(null);
        const drawLayerRef = useRef(null);
        const coordsRef = useRef(null);

        useEffect(() => {
          const map = L.map("map", {
            center: [20.5937, 78.9629],
            zoom: 5,
            zoomControl: true,
            attributionControl: false,
          });
          mapRef.current = map;

          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
          }).addTo(map);

          const pointsLayer = L.layerGroup().addTo(map);
          layerRef.current = pointsLayer;

          const drawnItems = new L.FeatureGroup();
          drawLayerRef.current = drawnItems;
          map.addLayer(drawnItems);

          const drawControl = new L.Control.Draw({
            edit: {
              featureGroup: drawnItems,
              edit: false,
            },
            draw: {
              polygon: true,
              rectangle: true,
              circle: false,
              polyline: false,
              marker: false,
              circlemarker: false,
            },
          });
          map.addControl(drawControl);

          map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers();
            drawnItems.addLayer(e.layer);

            const shape = e.layer.toGeoJSON();
            const coords =
              shape.geometry.type === "Polygon"
                ? shape.geometry.coordinates[0]
                : [];

            if (!coords.length) {
              onRegionSelect(null);
              return;
            }
            const selected = crimes.filter((c) => {
              const lat = parseFloat(c.Latitude);
              const lng = parseFloat(c.Longitude);
              if (!isFinite(lat) || !isFinite(lng)) return false;
              const inside = pointInPolygon([lng, lat], coords);
              return inside;
            });
            onRegionSelect(selected);
          });

          map.on("mousemove", (e) => {
            const el = document.getElementById("coords-pill");
            if (el) {
              el.textContent =
                e.latlng.lat.toFixed(5) + ", " + e.latlng.lng.toFixed(5);
            }
          });

          return () => {
            map.remove();
          };
        }, []);

        useEffect(() => {
          const map = mapRef.current;
          const pointsLayer = layerRef.current;
          if (!map || !pointsLayer) return;
          pointsLayer.clearLayers();
          if (!crimes || !crimes.length) return;

          let bounds = null;
          crimes.forEach((crime) => {
            const lat = parseFloat(crime.Latitude);
            const lng = parseFloat(crime.Longitude);
            if (!isFinite(lat) || !isFinite(lng)) return;

            const color = crimeColor(crime);
            const iconChar = crimeIcon(crime);

            const marker = L.circleMarker([lat, lng], {
              radius: 7,
              color,
              fillColor: color,
              fillOpacity: 0.6,
              weight: 1.2,
            }).addTo(pointsLayer);

            marker.bindPopup(
              `
              <div style="min-width:210px;font-size:12px">
                <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">
                  FIR ${crime.FIRNo || "—"}
                </div>
                <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">
                  ${crime.UnitName || ""} · ${crime.District_Name || ""}
                </div>
                <div style="font-size:11px;margin-bottom:4px;">
                  <strong>${crime.CrimeHead_Name || "Crime"}</strong>
                </div>
                <div style="font-size:11px;color:#9ca3af;">
                  ${crime.Offence_From_Date || ""} → ${crime.Offence_To_Date || ""}
                </div>
              </div>
            `
            );

            marker.on("click", () => onCrimeClick(crime));

            if (!bounds) {
              bounds = L.latLngBounds([lat, lng], [lat, lng]);
            } else {
              bounds.extend([lat, lng]);
            }
          });

          if (bounds) {
            try {
              map.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
            } catch (e) {
              // ignore
            }
          }
        }, [crimes, onCrimeClick]);

        const handleFitClick = () => {
          const map = mapRef.current;
          const pointsLayer = layerRef.current;
          if (!map || !pointsLayer) return;
          let bounds = null;
          pointsLayer.eachLayer((layer) => {
            if (layer.getLatLng) {
              const ll = layer.getLatLng();
              if (!bounds) bounds = L.latLngBounds(ll, ll);
              else bounds.extend(ll);
            }
          });
          if (bounds) {
            map.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
          }
        };

        const handleClearRegion = () => {
          const drawn = drawLayerRef.current;
          if (drawn) drawn.clearLayers();
          onRegionSelect(null);
        };

        return (
          <>
            <div className="map-hud">
              <button className="map-btn active" type="button">
                <span>●</span> Points
              </button>
              <button className="map-btn" type="button" onClick={handleFitClick}>
                <span>🧭</span> Fit to Crimes
              </button>
              <button
                className="map-btn"
                type="button"
                onClick={handleClearRegion}
              >
                <span>⨂</span> Clear Region
              </button>
            </div>
            <div id="map" />
            <div id="coords-pill" className="coords-pill">
              Move cursor on map
            </div>
          </>
        );
      }

      // ---- Right panel charts ---------------------------------------------
      function TimeCharts({ crimes }) {
        const [mode, setMode] = useState("week");
        const weekCanvasRef = useRef(null);
        const hourCanvasRef = useRef(null);
        const monthCanvasRef = useRef(null);
        const chartsRef = useRef({ week: null, hour: null, month: null });

        const timeBuckets = useMemo(() => {
          const week = [0, 0, 0, 0, 0, 0, 0];
          const hour = new Array(24).fill(0);
          const month = new Array(12).fill(0);

          crimes.forEach((c) => {
            const d =
              parseDate(c.FIR_Reg_DateTime) ||
              parseDate(c.FIR_Date) ||
              parseDate(c.Offence_From_Date);
            if (!d) return;
            week[d.getDay()] += 1;
            hour[d.getHours()] += 1;
            month[d.getMonth()] += 1;
          });
          return { week, hour, month };
        }, [crimes]);

        useEffect(() => {
          const makeChart = (ctx, type, labels, data) =>
            new Chart(ctx, {
              type: "bar",
              data: {
                labels,
                datasets: [
                  {
                    label: "Crimes",
                    data,
                    backgroundColor: "rgba(255,58,46,0.65)",
                    borderRadius: 4,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: false },
                },
                scales: {
                  x: {
                    ticks: { color: "#9ca3af", font: { size: 10 } },
                    grid: { display: false },
                  },
                  y: {
                    ticks: {
                      color: "#9ca3af",
                      font: { size: 10 },
                      precision: 0,
                    },
                    grid: { color: "rgba(55,65,81,0.4)" },
                  },
                },
              },
            });

          if (weekCanvasRef.current && !chartsRef.current.week) {
            chartsRef.current.week = makeChart(
              weekCanvasRef.current.getContext("2d"),
              "bar",
              ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
              timeBuckets.week
            );
          }
          if (hourCanvasRef.current && !chartsRef.current.hour) {
            chartsRef.current.hour = makeChart(
              hourCanvasRef.current.getContext("2d"),
              "bar",
              Array.from({ length: 24 }, (_, i) => i.toString()),
              timeBuckets.hour
            );
          }
          if (monthCanvasRef.current && !chartsRef.current.month) {
            chartsRef.current.month = makeChart(
              monthCanvasRef.current.getContext("2d"),
              "bar",
              ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
              timeBuckets.month
            );
          }
        }, [timeBuckets]);

        useEffect(() => {
          const update = (chart, data) => {
            if (!chart) return;
            chart.data.datasets[0].data = data;
            chart.update();
          };
          update(chartsRef.current.week, timeBuckets.week);
          update(chartsRef.current.hour, timeBuckets.hour);
          update(chartsRef.current.month, timeBuckets.month);
        }, [timeBuckets]);

        const total = crimes.length;

        return (
          <div id="right-panel">
            <div className="rp-header">
              <div>
                <div className="rp-title">Time Insights</div>
                <div>Total crimes: {total}</div>
              </div>
              <button
                type="button"
                className={
                  "rp-toggle-btn " + (total > 0 ? "active" : "")
                }
              >
                Load Timing
              </button>
            </div>
            <div className="rp-body">
              <div className="chart-card">
                <div className="chart-title">Weekday Pattern</div>
                <div style={{ height: 140 }}>
                  <canvas ref={weekCanvasRef} />
                </div>
              </div>
              <div className="chart-card">
                <div className="chart-title">Hourly Pattern</div>
                <div style={{ height: 140 }}>
                  <canvas ref={hourCanvasRef} />
                </div>
              </div>
              <div className="chart-card">
                <div className="chart-title">Monthly Pattern</div>
                <div style={{ height: 140 }}>
                  <canvas ref={monthCanvasRef} />
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ---- FIR detail drawer (popup style, left list or side) -------------
      function FIRDetail({ crime }) {
        if (!crime) return null;
        const fields = [
          "FIRNo",
          "Crime_No",
          "FIR_ID",
          "CrimeHead_Name",
          "CrimeGroup_Name",
          "District_Name",
          "UnitName",
          "FIR Type",
          "FIR_Stage",
          "Complaint_Mode",
          "Offence_From_Date",
          "Offence_To_Date",
          "FIR_Reg_DateTime",
          "Place of Offence",
          "Distance from PS",
          "Beat_Name",
          "Village_Area_Name",
          "ActSection",
          "IOName",
          "IOAssigned_Date",
          "Male",
          "Female",
          "Boy",
          "Girl",
          "Age 0",
          "VICTIM COUNT",
          "Accused Count",
          "Arrested Male",
          "Arrested Female",
          "Arrested Count No.",
          "Accused_ChargeSheeted Count",
          "Conviction Count",
          "Latitude",
          "Longitude",
        ];

        return (
          <div
            style={{
              marginTop: "0.4rem",
              borderRadius: 6,
              border: "1px solid var(--border2)",
              background: "var(--dark2)",
              padding: "0.55rem 0.6rem",
              maxHeight: 180,
              overflowY: "auto",
              fontSize: "0.78rem",
            }}
          >
            <div
              style={{
                fontFamily: "var(--font-mono)",
                fontSize: "0.7rem",
                letterSpacing: "0.12em",
                textTransform: "uppercase",
                color: "var(--amber)",
                marginBottom: "0.35rem",
              }}
            >
              FIR Detail
            </div>
            <div>
              {fields.map((f) => {
                const v = crime[f];
                if (v === undefined || v === null || v === "") return null;
                return (
                  <div
                    key={f}
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      gap: "0.5rem",
                      marginBottom: "0.18rem",
                    }}
                  >
                    <span style={{ color: "var(--muted)" }}>{f}</span>
                    <span style={{ textAlign: "right" }}>{String(v)}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ---- Sidebar component -----------------------------------------------
      function Sidebar({
        allCrimes,
        visibleCrimes,
        onFileLoaded,
        onCrimeClick,
        filters,
        setFilters,
        selectedCrime,
      }) {
        const [search, setSearch] = useState("");
        const [crimeTypes, setCrimeTypes] = useState([]);
        const [districts, setDistricts] = useState([]);

        useEffect(() => {
          const types = Array.from(
            new Set(
              allCrimes
                .map((c) => c.CrimeHead_Name)
                .filter((x) => x && String(x).trim() !== "")
            )
          ).sort();
          setCrimeTypes(types);

          const dists = Array.from(
            new Set(
              allCrimes
                .map((c) => c.District_Name)
                .filter((x) => x && String(x).trim() !== "")
            )
          ).sort();
          setDistricts(dists);
        }, [allCrimes]);

        const filteredList = useMemo(() => {
          let data = visibleCrimes;
          if (search.trim()) {
            const q = search.toLowerCase();
            data = data.filter((c) => {
              const fir = (c.FIRNo || "").toString().toLowerCase();
              const head = (c.CrimeHead_Name || "").toLowerCase();
              const place = (c["Place of Offence"] || "").toLowerCase();
              return (
                fir.includes(q) || head.includes(q) || place.includes(q)
              );
            });
          }
          return data.slice(0, 200);
        }, [visibleCrimes, search]);

        const handleFileChange = (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          Papa.parse(file, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: (results) => {
              const rows = results.data || [];
              onFileLoaded(rows);
            },
            error: (err) => {
              alert("Failed to parse CSV: " + err.message);
            },
          });
        };

        const toggleCrimeType = (type) => {
          const set = new Set(filters.crimeTypes);
          if (set.has(type)) set.delete(type);
          else set.add(type);
          setFilters({ ...filters, crimeTypes: Array.from(set) });
        };

        const toggleDistrict = (dist) => {
          const set = new Set(filters.districts);
          if (set.has(dist)) set.delete(dist);
          else set.add(dist);
          setFilters({ ...filters, districts: Array.from(set) });
        };

        return (
          <div id="sidebar">
            <div className="panel-header">
              <span className="title">Crime Filters</span>
              <span>FORESIGHT</span>
            </div>
            <div className="panel-body">
              <div className="input-row">
                <div className="field-label">Upload FIR CSV</div>
                <input
                  type="file"
                  accept=".csv"
                  onChange={handleFileChange}
                  style={{
                    fontSize: "0.78rem",
                    color: "var(--text)",
                  }}
                />
              </div>

              <div className="stat-row">
                <span>Total crimes (loaded)</span>
                <span>
                  <strong>{allCrimes.length}</strong>
                </span>
              </div>
              <div className="stat-row">
                <span>Visible after filters / region</span>
                <span>
                  <strong>{visibleCrimes.length}</strong>
                </span>
              </div>

              <div className="input-row" style={{ marginTop: "0.4rem" }}>
                <div className="field-label">Search FIR / Crime / Place</div>
                <input
                  className="text-input"
                  placeholder="Search..."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                />
              </div>

              <div className="input-row">
                <div className="field-label">Filter by Crime Type</div>
                <div className="chips-row">
                  {crimeTypes.slice(0, 8).map((t) => {
                    const active = filters.crimeTypes.includes(t);
                    return (
                      <button
                        key={t}
                        type="button"
                        onClick={() => toggleCrimeType(t)}
                        style={{
                          borderRadius: 999,
                          border: active
                            ? "1px solid var(--red)"
                            : "1px solid var(--border2)",
                          padding: "0.2rem 0.55rem",
                          fontFamily: "var(--font-mono)",
                          fontSize: "0.68rem",
                          cursor: "pointer",
                          background: active
                            ? "rgba(255,58,46,0.15)"
                            : "transparent",
                          color: active ? "var(--red)" : "var(--muted)",
                        }}
                      >
                        {t}
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="input-row">
                <div className="field-label">
                  Filter by District (multi-select)
                </div>
                <div className="checkbox-group">
                  {districts.map((d) => (
                    <label key={d} className="checkbox-item">
                      <input
                        type="checkbox"
                        checked={filters.districts.includes(d)}
                        onChange={() => toggleDistrict(d)}
                      />
                      <span>{d}</span>
                    </label>
                  ))}
                  {districts.length === 0 && (
                    <div style={{ fontSize: "0.76rem", color: "var(--muted)" }}>
                      Upload data to see districts.
                    </div>
                  )}
                </div>
              </div>

              <div className="input-row">
                <div className="field-label">
                  Crimes in current filters / region
                </div>
                <div className="scroll-list">
                  {filteredList.length === 0 ? (
                    <div
                      style={{
                        padding: "0.4rem",
                        fontSize: "0.76rem",
                        color: "var(--muted)",
                      }}
                    >
                      No crimes match filters.
                    </div>
                  ) : (
                    filteredList.map((c, idx) => (
                      <div
                        key={(c.FIR_ID || "") + "-" + idx}
                        className="crime-row"
                        onClick={() => onCrimeClick(c)}
                      >
                        <div className="crime-row-title">
                          {c.CrimeHead_Name || "Crime"} ·{" "}
                          {c.District_Name || ""}
                        </div>
                        <div className="crime-row-meta">
                          FIR {c.FIRNo || "—"} · {c.UnitName || ""} ·{" "}
                          {c["Place of Offence"] || ""}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>

              <div className="hint">
                • Use the drawing tools on the map (polygon/rectangle button) to
                select a region. Foresight will recompute counts and the left
                list for that area only.<br />
                • Clicking a row or a pin opens the full FIR details.
              </div>

              <FIRDetail crime={selectedCrime} />
            </div>
          </div>
        );
      }

      // ---- Main App --------------------------------------------------------
      function App() {
        const [allCrimes, setAllCrimes] = useState([]);
        const [regionCrimes, setRegionCrimes] = useState(null);
        const [filters, setFilters] = useState({
          crimeTypes: [],
          districts: [],
        });
        const [selectedCrime, setSelectedCrime] = useState(null);

        const visibleCrimes = useMemo(() => {
          const base = regionCrimes || allCrimes;
          return base.filter((c) => {
            if (filters.crimeTypes.length) {
              const h = c.CrimeHead_Name || "";
              if (!filters.crimeTypes.includes(h)) return false;
            }
            if (filters.districts.length) {
              const d = c.District_Name || "";
              if (!filters.districts.includes(d)) return false;
            }
            const lat = parseFloat(c.Latitude);
            const lng = parseFloat(c.Longitude);
            if (!isFinite(lat) || !isFinite(lng)) return false;
            return true;
          });
        }, [allCrimes, regionCrimes, filters]);

        const handleFileLoaded = (rows) => {
          setAllCrimes(rows);
          setRegionCrimes(null);
          setSelectedCrime(null);
          setFilters({ crimeTypes: [], districts: [] });
        };

        const handleRegionSelect = (rows) => {
          setRegionCrimes(rows && rows.length ? rows : null);
        };

        return (
          <>
            <div id="topbar">
              <div className="tb-left">
                <div className="logo-icon">📍</div>
                <div className="logo-text">
                  <div className="logo-title">Foresight</div>
                  <div className="logo-sub">
                    Crime Intelligence Map · Team Foresight
                  </div>
                </div>
                <div className="team-pill">Team Foresight</div>
              </div>
              <div className="tb-right">
                <div className="pill">
                  <span className="status-dot"></span>
                  <span>{allCrimes.length} records</span>
                </div>
                <div className="pill">
                  <span>📌</span>
                  <span>{visibleCrimes.length} on map</span>
                </div>
                <div className="pill">
                  <span>🗺️</span>
                  <span>Interactive region select</span>
                </div>
              </div>
            </div>
            <div id="layout">
              <Sidebar
                allCrimes={allCrimes}
                visibleCrimes={visibleCrimes}
                onFileLoaded={handleFileLoaded}
                onCrimeClick={setSelectedCrime}
                filters={filters}
                setFilters={setFilters}
                selectedCrime={selectedCrime}
              />
              <div id="map-wrap">
                <CrimeMap
                  crimes={visibleCrimes}
                  onCrimeClick={setSelectedCrime}
                  onRegionSelect={handleRegionSelect}
                />
              </div>
              <TimeCharts crimes={visibleCrimes} />
            </div>
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
